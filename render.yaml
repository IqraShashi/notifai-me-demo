services:
  - type: web
    name: notifai-me-demo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/news_platform.sqlite
      - key: ENABLE_DIAGNOSTICS
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: GNEWS_API_KEY
        sync: false
    disk:
      name: notifai-data
      mountPath: /data
      sizeGB: 1
